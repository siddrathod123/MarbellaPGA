<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Marbella Drinking Open</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="bg-glow one"></div>
  <div class="bg-glow two"></div>

  <div class="shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Live Golf Scorecard</p>
        <h1 id="gameTitle">Marbella Drinking Open</h1>
      </div>
      <button class="pill" id="refreshBtn">↻ Refresh</button>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav">
      <button class="nav active" data-view="score">⛳<span>Score</span></button>
      <button class="nav" data-view="leaderboard">🏆<span>Live</span></button>
      <button class="nav" data-view="setup">⚙️<span>Setup</span></button>
      <button class="nav" data-view="card">📋<span>Card</span></button>
    </nav>
  </div>

  <div id="toast" class="toast"></div>
  <script src="/static/app.js"></script>
</body>
</html>
