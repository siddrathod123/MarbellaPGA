<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Marbella Ryder Cup</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">Marbella Golf Tour</p>
        <h1>Ryder Cup Live</h1>
      </div>
      <div class="live-pill"><span></span>LIVE</div>
    </header>

    <main id="app"></main>

    <nav class="bottom-nav" aria-label="App navigation">
      <button class="nav-btn active" data-view="home"><span>⌂</span>Home</button>
      <button class="nav-btn" data-view="teams"><span>◆</span>Teams</button>
      <button class="nav-btn" data-view="scores"><span>⛳</span>Scores</button>
      <button class="nav-btn" data-view="bets"><span>£</span>Bets</button>
      <button class="nav-btn" data-view="summary"><span>🏆</span>Live</button>
    </nav>
  </div>
  <script src="app.js"></script>
</body>
</html>
